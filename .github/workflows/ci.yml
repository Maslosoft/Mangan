name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'

    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/?replicaSet=rs0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start MongoDB replica set
        run: |
          docker run -d \
            --name mongodb \
            -p 27017:27017 \
            mongo:7 \
            --replSet rs0 \
            --bind_ip_all

          echo "Waiting for MongoDB to accept connections..."
          until docker exec mongodb mongosh --quiet --eval "db.adminCommand('ping').ok" | grep 1; do
            sleep 1
          done

          echo "Initiating replica set..."
          docker exec mongodb mongosh --quiet --eval '
            rs.initiate({
              _id: "rs0",
              members: [
                { _id: 0, host: "127.0.0.1:27017" }
              ]
            })
          '

          echo "Waiting for MongoDB replica set primary..."
          until docker exec mongodb mongosh --quiet --eval "db.hello().isWritablePrimary" | grep true; do
            sleep 1
          done

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mongodb, gd, fileinfo
          tools: composer:v2
          coverage: none

      - name: Show versions
        run: |
          php -v
          php -m | sort
          composer --version

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Prepare runtime
        run: |
          mkdir -p runtime
          rm -rf runtime/*

      - name: Run unit tests
        run: vendor/bin/codecept run unit
