name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      MONGODB_URI: mongodb://127.0.0.1:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mongodb, gd, fileinfo
          tools: composer:v2
          coverage: none

      - name: Show versions
        run: |
          php -v
          php -m | sort
          composer --version

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Prepare runtime
        run: |
          mkdir -p runtime
          rm -rf runtime/*

      - name: Run unit tests
        run: vendor/bin/codecept run unit
